<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Campus Crawings</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: linear-gradient(90deg, #000000, #1a0000);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        .navbar-brand {
            color: #ff2c2c !important;
            letter-spacing: 1px;
        }

        .nav-link {
            color: #ddd !important;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ff2c2c !important;
        }

        /* HOME SECTION */
        .home-page {
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CARD */
        .card {
            background: #111;
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.2);
            animation: fadeSlide 0.8s ease-in-out;
        }

        .card h1 {
            color: #ff2c2c;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* ANIMATION */
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* BUTTON STYLE (for future use) */
        .btn-red {
            background: linear-gradient(45deg, #ff0000, #b30000);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-red:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px red;
        }

        .navbar-toggler {
            border: 1px solid red;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">

            <a class="navbar-brand" href="#"><b>CAMPUS CRAWINGS</b></a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact Us</a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>

    <!-- HOME -->
    <div class="home-page">
        <div class="card">
            <h1>GODAVARI RUCHULLU</h1>
            <p class="mt-3 text-secondary">SMEC</p>
            <button class="btn-red mt-3" onclick="window.location.href='https://7988784321.ccbp.tech/'">
                Explore Menu
            </button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
