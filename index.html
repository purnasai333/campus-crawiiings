<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Campus Crawings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(90deg, #000000, #1a0000); box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        .navbar-brand { color: #ff2c2c !important; letter-spacing: 1px; }
        .nav-link { color: #ddd !important; transition: 0.3s; }
        .nav-link:hover { color: #ff2c2c !important; }
        .hero { height: 90vh; display: flex; justify-content: center; align-items: center; }
        .card { background: #111; border: 1px solid rgba(255,0,0,0.3); border-radius: 15px; padding: 40px; text-align: center; box-shadow: 0 0 25px rgba(255,0,0,0.2); animation: fadeSlide 0.8s ease-in-out; }
        .card h1 { color: #ff2c2c; font-weight: bold; letter-spacing: 2px; }
        @keyframes fadeSlide { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .btn-red { background: linear-gradient(45deg, #ff0000, #b30000); border: none; color: white; padding: 10px 20px; border-radius: 8px; transition: 0.3s; }
        .btn-red:hover { transform: scale(1.05); box-shadow: 0 0 10px red; }
        .menu-section { padding: 60px 20px; }
        .menu-section h2 { color: #ff2c2c; text-align: center; margin-bottom: 40px; letter-spacing: 2px; }
        .menu-card { background: #111; border: 1px solid rgba(255,0,0,0.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; transition: 0.3s; }
        .menu-card:hover { box-shadow: 0 0 15px rgba(255,0,0,0.4); transform: translateY(-3px); }
        .menu-card h5 { color: #ff2c2c; margin-bottom: 8px; }
        .menu-card .price { color: #00e676; font-weight: bold; font-size: 18px; }
        .menu-card .category { color: #aaa; font-size: 13px; }
        .badge-available { background: #00e676; color: #000; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
        .badge-unavailable { background: #ff2c2c; color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
        .loading { text-align: center; color: #aaa; padding: 40px; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#"><b>CAMPUS CRAWINGS</b></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="#home">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#menu">Menu</a></li>
                <li class="nav-item"><a class="nav-link" href="#">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact Us</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- HOME -->
<div class="hero" id="home">
    <div class="card">
        <h1>GODAVARI RUCHULLU</h1>
        <p class="mt-3 text-secondary">SMEC</p>
        <button class="btn-red mt-3" onclick="document.getElementById('menu').scrollIntoView({behavior:'smooth'})">
            Explore Menu
        </button>
    </div>
</div>

<!-- MENU SECTION -->
<div class="menu-section" id="menu">
    <h2>OUR MENU</h2>
    <div class="container">
        <div class="row" id="menu-container">
            <div class="loading">Loading menu...</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const SUPABASE_URL = 'https://whjbnhxaeowncgdpdbzj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_U3chvohlT1I-LtjpZtwxhw_E02ZsvtB';

    async function loadMenu() {
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/menu_items?select=*`, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                }
            });
            const items = await response.json();
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            items.forEach(item => {
                container.innerHTML += `
                <div class="col-md-4">
                    <div class="menu-card">
                        <h5>${item.name}</h5>
                        <p class="category">${item.category}</p>
                        <p class="price">₹${item.price}</p>
                        <span class="${item.available ? 'badge-available' : 'badge-unavailable'}">
                            ${item.available ? 'Available' : 'Not Available'}
                        </span>
                    </div>
                </div>`;
            });
        } catch(error) {
            document.getElementById('menu-container').innerHTML = '<p style="color:red;text-align:center;">Failed to load menu.</p>';
        }
    }

    loadMenu();
</script>
</body>
</html>
