<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Campus Crawings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(90deg, #000000, #1a0000); box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        .navbar-brand { color: #ff2c2c !important; letter-spacing: 1px; }
        .nav-link { color: #ddd !important; transition: 0.3s; }
        .nav-link:hover { color: #ff2c2c !important; }
        .navbar-toggler { border: 1px solid red; }

        /* HOME */
        .home-page { height: 90vh; display: flex; justify-content: center; align-items: center; }
        .home-card { background: #111; border: 1px solid rgba(255,0,0,0.3); border-radius: 15px; padding: 40px; text-align: center; box-shadow: 0 0 25px rgba(255,0,0,0.2); animation: fadeSlide 0.8s ease-in-out; }
        .home-card h1 { color: #ff2c2c; font-weight: bold; letter-spacing: 2px; }
        @keyframes fadeSlide { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .btn-red { background: linear-gradient(45deg, #ff0000, #b30000); border: none; color: white; padding: 10px 20px; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .btn-red:hover { transform: scale(1.05); box-shadow: 0 0 10px red; color: white; }

        /* MENU */
        .menu-section { padding: 60px 20px; background: #0a0a0a; }
        .menu-section h2 { color: #ff2c2c; text-align: center; margin-bottom: 40px; letter-spacing: 2px; font-weight: bold; }
        .menu-card { background: #111; border: 1px solid rgba(255,0,0,0.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; transition: 0.3s; }
        .menu-card:hover { box-shadow: 0 0 15px rgba(255,0,0,0.4); transform: translateY(-3px); }
        .menu-card h5 { color: #ff2c2c; margin-bottom: 8px; font-weight: bold; }
        .menu-card .price { color: #00e676; font-weight: bold; font-size: 20px; margin: 8px 0; }
        .menu-card .category { color: #aaa; font-size: 13px; margin-bottom: 10px; }
        .badge-available { background: #00e676; color: #000; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-unavailable { background: #ff2c2c; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .loading { text-align: center; color: #aaa; padding: 40px; font-size: 18px; }

        /* ORDERS */
        .order-section { padding: 60px 20px; background: #0d0d0d; }
        .order-section h2 { color: #ff2c2c; text-align: center; margin-bottom: 40px; letter-spacing: 2px; font-weight: bold; }
        .order-form { background: #111; border: 1px solid rgba(255,0,0,0.3); border-radius: 15px; padding: 40px; max-width: 600px; margin: 0 auto; box-shadow: 0 0 25px rgba(255,0,0,0.1); }
        .order-form label { color: #ddd; margin-bottom: 5px; display: block; }
        .order-form input, .order-form select { background: #1a1a1a; border: 1px solid rgba(255,0,0,0.3); color: white; border-radius: 8px; padding: 10px; width: 100%; margin-bottom: 20px; }
        .order-form input:focus, .order-form select:focus { outline: none; border-color: #ff2c2c; box-shadow: 0 0 8px rgba(255,0,0,0.3); }
        .order-form select option { background: #1a1a1a; }
        .success-msg { color: #00e676; text-align: center; font-weight: bold; margin-top: 15px; display: none; }
        .error-msg { color: #ff2c2c; text-align: center; font-weight: bold; margin-top: 15px; display: none; }

        /* FOOTER */
        footer { background: #000; text-align: center; padding: 20px; color: #555; border-top: 1px solid rgba(255,0,0,0.2); }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#"><b>CAMPUS CRAWINGS</b></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="#home">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#menu">Menu</a></li>
                <li class="nav-item"><a class="nav-link" href="#order">Order</a></li>
                <li class="nav-item"><a class="nav-link" href="#">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact Us</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- HOME -->
<div class="home-page" id="home">
    <div class="home-card">
        <h1>GODAVARI RUCHULLU</h1>
        <p class="mt-3 text-secondary">SMEC</p>
        <button class="btn-red mt-3" onclick="document.getElementById('menu').scrollIntoView({behavior:'smooth'})">
            Explore Menu
        </button>
    </div>
</div>

<!-- MENU SECTION -->
<div class="menu-section" id="menu">
    <h2>OUR MENU</h2>
    <div class="container">
        <div class="row" id="menu-container">
            <div class="loading">⏳ Loading menu...</div>
        </div>
    </div>
</div>

<!-- ORDER SECTION -->
<div class="order-section" id="order">
    <h2>PLACE YOUR ORDER</h2>
    <div class="order-form">
        <label>Your Name</label>
        <input type="text" id="customer-name" placeholder="Enter your name">

        <label>Your Phone Number</label>
        <input type="text" id="customer-phone" placeholder="Enter your phone number">

        <label>Select Item</label>
        <select id="order-item">
            <option value="">-- Select a menu item --</option>
        </select>

        <label>Quantity</label>
        <input type="number" id="order-qty" placeholder="Enter quantity" min="1" value="1">

        <button class="btn-red w-100" onclick="placeOrder()">Place Order 🍽️</button>

        <div class="success-msg" id="success-msg">✅ Order placed successfully!</div>
        <div class="error-msg" id="error-msg">❌ Failed to place order. Try again!</div>
    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>© 2025 Campus Crawings — Godavari Ruchullu, SMEC</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const SUPABASE_URL = 'https://whjbnhxaeowncgdpdbzj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_U3chvohlT1I-LtjpZtwxhw_E02ZsvtB';

    let menuItems = [];

    async function loadMenu() {
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/menu_items?select=*`, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                }
            });
            menuItems = await response.json();
            const container = document.getElementById('menu-container');
            const select = document.getElementById('order-item');
            container.innerHTML = '';
            menuItems.forEach(item => {
                container.innerHTML += `
                <div class="col-md-4">
                    <div class="menu-card">
                        <h5>${item.name}</h5>
                        <p class="category">${item.category}</p>
                        <p class="price">₹${item.price}</p>
                        <span class="${item.available ? 'badge-available' : 'badge-unavailable'}">
                            ${item.available ? 'Available' : 'Not Available'}
                        </span>
                    </div>
                </div>`;
                if (item.available) {
                    select.innerHTML += `<option value="${item.id}">${item.name} — ₹${item.price}</option>`;
                }
            });
        } catch(error) {
            document.getElementById('menu-container').innerHTML = '<p style="color:red;text-align:center;">Failed to load menu.</p>';
        }
    }

    async function placeOrder() {
        const name = document.getElementById('customer-name').value.trim();
        const phone = document.getElementById('customer-phone').value.trim();
        const itemId = document.getElementById('order-item').value;
        const qty = document.getElementById('order-qty').value;

        if (!name || !phone || !itemId || !qty) {
            alert('Please fill all fields!');
            return;
        }

        const selectedItem = menuItems.find(i => i.id == itemId);

        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({
                    customer_name: name,
                    customer_phone: phone,
                    item_name: selectedItem.name,
                    quantity: parseInt(qty),
                    total_price: selectedItem.price * parseInt(qty)
                })
            });

            if (response.ok) {
                document.getElementById('success-msg').style.display = 'block';
                document.getElementById('error-msg').style.display = 'none';
                document.getElementById('customer-name').value = '';
                document.getElementById('customer-phone').value = '';
                document.getElementById('order-item').value = '';
                document.getElementById('order-qty').value = '1';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        } catch(error) {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    loadMenu();
</script>
</body>
</html>
